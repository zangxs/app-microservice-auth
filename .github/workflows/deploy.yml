name: Deploy Auth Service

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  EC2_HOST: 3.19.62.218
  EC2_USER: ubuntu
  DEPLOY_PATH: /opt/landscape-app

jobs:
  build-and-test:
    name: Build & Test Auth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build & Test Auth Service
        run: mvn clean test

  deploy:
    name: Deploy Auth to EC2
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Upload project to EC2
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'target' \
            --exclude '.git' \
            --exclude 'infrastructure/.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Deploy auth-service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "cd ${{ env.DEPLOY_PATH }}/infrastructure && docker compose -f docker-compose.yml up -d --build auth-service && docker image prune -f"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "cd ${{ env.DEPLOY_PATH }}/infrastructure && docker compose -f docker-compose.yml ps auth-service"
