services:

  postgres-auth:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: brayanpv
      POSTGRES_PASSWORD: brayanpv
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./init/auth:/docker-entrypoint-initdb.d

  postgres-landscape:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: landscapedb
      POSTGRES_USER: landscape
      POSTGRES_PASSWORD: landscape
    volumes:
      - postgres_landscape_data:/var/lib/postgresql/data
      - ./init/landscape:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_auth_data:
  postgres_landscape_data:
  minio_data:
  rabbitmq_data:
